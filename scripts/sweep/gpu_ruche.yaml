method: random
metric:
  goal: maximize
  name: metrics/val_mean_fide_score_res0.5
parameters:
  output_size:
    values: [64, 128]
  num_layers:
    values: [10, 14]
  hidden_size:
    values: [128, 256]
  num_prototypes:
    values: [256, 512]
  background_noise_lambda:
    min: 0.02
    max: 0.2
  sensitivity_noise_std:
    min: 0.001
    max: 0.03
  lr:
    values: [0.00001, 0.00003, 0.0001]

command:
  - python
  - -m
  - scripts.train
  - --config
  - concept_sweep.yaml
  - --sweep
